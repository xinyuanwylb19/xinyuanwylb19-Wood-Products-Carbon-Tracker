<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wood Products Carbon Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      .btn:disabled{opacity:.5;cursor:not-allowed}
      .title-bg{ background-image: url('./assets/img/Background.JPG'); background-size: cover; background-position: center; }
      .title-overlay{ background: linear-gradient(to right, rgba(255,255,255,0.92), rgba(255,255,255,0.75)); }

      /* Tab styles */
      .tab-btn {
        padding: 0.6rem 1.4rem;
        border-radius: 0.75rem 0.75rem 0 0;
        font-weight: 600;
        font-size: 0.95rem;
        border: 2px solid transparent;
        border-bottom: none;
        cursor: pointer;
        transition: background 0.18s, color 0.18s, border-color 0.18s;
        background: #e5e7eb;
        color: #6b7280;
        position: relative;
        bottom: -2px;
      }
      .tab-btn.active {
        background: #fff;
        color: #1e3a5f;
        border-color: #cbd5e1;
        border-bottom-color: #fff;
        z-index: 2;
      }
      .tab-btn:not(.active):hover {
        background: #d1d5db;
        color: #374151;
      }
      .tab-panel { display: none; }
      .tab-panel.active { display: block; }

      /* Log Carbon tab specific */
      .log-input-label { font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 2px; }
      .log-input-field {
        width: 100%;
        border: 1.5px solid #cbd5e1;
        border-radius: 0.5rem;
        padding: 0.4rem 0.65rem;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s;
        background: #f8fafc;
      }
      .log-input-field:focus { border-color: #4f7c3e; background: #fff; }

      .product-card {
        border: 2px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 0.6rem 0.9rem;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        font-size: 0.85rem;
        font-weight: 500;
        color: #374151;
        background: #f8fafc;
        text-align: center;
      }
      .product-card:hover { border-color: #4f7c3e; background: #f0fdf4; }
      .product-card.selected { border-color: #4f7c3e; background: #dcfce7; color: #14532d; font-weight: 700; }
      .product-card.suggested { border-color: #86efac; }

      .log-result-badge {
        display: inline-block;
        padding: 0.25rem 0.7rem;
        border-radius: 9999px;
        font-size: 0.78rem;
        font-weight: 600;
      }

      .vol-method-btn.selected {
        border-color: #15803d;
        background: #dcfce7;
        color: #14532d;
      }
      .vol-method-btn:not(.selected):hover {
        border-color: #86efac;
        background: #f0fdf4;
        color: #166534;
      }
      .coming-soon-overlay {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 400px;
        gap: 1rem;
      }
      .coming-soon-icon { font-size: 4rem; line-height: 1; }

      /* PPs Carbon tab */
      .pps-type-btn { transition: border-color 0.15s, background 0.15s, color 0.15s; }
      .pps-type-btn.selected {
        border-color: #0d9488;
        background: #ccfbf1;
        color: #134e4a;
      }
      .pps-type-btn:not(.selected):hover {
        border-color: #5eead4;
        background: #f0fdfa;
        color: #0f766e;
      }
      .pps-product-card {
        border: 2px solid #e2e8f0;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        font-size: 0.8rem;
        font-weight: 500;
        color: #374151;
        background: #f8fafc;
        text-align: center;
        overflow: hidden;
      }
      .pps-product-card:hover { border-color: #0d9488; }
      .pps-product-card.selected { border-color: #0d9488; background: #ccfbf1; color: #134e4a; font-weight: 700; }
      .pps-product-card.suggested { border-color: #5eead4; }
      .pps-product-card img { width: 100%; height: 90px; object-fit: cover; }
      .pps-product-card .card-label { padding: 0.35rem 0.5rem; }

      /* Research tab pub cards */
      .pub-card {
        border-left: 4px solid #0d9488;
        background: #f8fafc;
        border-radius: 0 0.75rem 0.75rem 0;
        padding: 0.75rem 1rem;
        transition: background 0.15s;
      }
      .pub-card:hover { background: #f0fdfa; }
      .team-avatar {
        width: 2.75rem; height: 2.75rem;
        border-radius: 9999px;
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; font-size: 0.9rem; color: #fff;
        flex-shrink: 0;
      }

      /* Loading indicator for tab fetch */
      .tab-loading {
        display: flex; align-items: center; justify-content: center;
        min-height: 200px; color: #6b7280; font-size: 0.9rem; gap: 0.5rem;
      }
    </style>

    <!-- ── Early tab-switch: defined before body renders so clicks never fail ── -->
    <script>
      window.switchTab = function(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const panel = document.getElementById('tab-' + name);
        if (panel) { panel.classList.add('active'); }
        if (btn)   { btn.classList.add('active'); }
      };
    </script>
  </head>

  <body class="bg-gray-100 min-h-screen font-sans">

    <!-- ========== HEADER ========== -->
    <div class="title-bg w-full">
      <div class="title-overlay px-6 py-5 flex items-center gap-5">
        <div class="flex items-center gap-3 flex-wrap">
          <img src="./assets/img/Logo_USDA.png"  alt="USDA"  class="h-12 object-contain" onerror="this.style.display='none'">
          <img src="./assets/img/Logo_NSRC.png"  alt="NSRC"  class="h-12 object-contain" onerror="this.style.display='none'">
          <img src="./assets/img/Logo_WGL.png"   alt="WGL"   class="h-12 object-contain" onerror="this.style.display='none'">
        </div>
        <div>
          <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight leading-tight">Wood Products Carbon Tracker</h1>
          <p  class="text-sm text-gray-500 mt-0.5">Carbon storage estimation across wood product life cycles · University of Maine</p>
        </div>
      </div>
    </div>

    <!-- ========== TABS NAV ========== -->
    <div class="mx-auto max-w-[1400px] px-4 pt-4">
      <nav class="flex flex-wrap gap-1 border-b-2 border-slate-200">
        <button class="tab-btn active" onclick="switchTab('hwp',    this)">🏠 End-use Products</button>
        <button class="tab-btn"        onclick="switchTab('log',    this)">🪵 Industrial Logs</button>
        <button class="tab-btn"        onclick="switchTab('pps',    this)">📐 Sawn Products</button>
        <button class="tab-btn"        onclick="switchTab('global', this)">🌍 Global WPs Carbon</button>
        <button class="tab-btn"        onclick="switchTab('about',  this)">🌳 Research &amp; Team</button>
        <button class="tab-btn"        onclick="switchTab('guide',  this)">📖 User Guide</button>
      </nav>
    </div>

    <!-- ========== MAIN CONTENT (tabs injected here) ========== -->
    <main class="mx-auto px-4 py-5 max-w-[1400px]">

      <!-- Placeholder divs — content loaded by fetch() below -->
      <div id="tab-hwp"    class="tab-panel active"><div class="tab-loading">⏳ Loading…</div></div>
      <div id="tab-log"    class="tab-panel">       <div class="tab-loading">⏳ Loading…</div></div>
      <div id="tab-pps"    class="tab-panel">       <div class="tab-loading">⏳ Loading…</div></div>
      <div id="tab-global" class="tab-panel">       <div class="tab-loading">⏳ Loading…</div></div>
      <div id="tab-about"  class="tab-panel">       <div class="tab-loading">⏳ Loading…</div></div>
      <div id="tab-guide"  class="tab-panel">       <div class="tab-loading">⏳ Loading…</div></div>

    </main>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js" defer></script>

    <!-- ========== TAB LOADER ========== -->
    <script>
      // Fetch all tab HTML fragments and inject them into their placeholder divs.
      // Each fragment file contains just the inner content (no <html>/<body> tags).
      const TAB_FILES = [
        { id: 'tab-hwp',    src: 'tabs/EndUseProducts.html'  },
        { id: 'tab-log',    src: 'tabs/IndustrialLogs.html'  },
        { id: 'tab-pps',    src: 'tabs/SawnProducts.html'    },
        { id: 'tab-global', src: 'tabs/GlobalWPsCarbon.html' },
        { id: 'tab-about',  src: 'tabs/ResearchAndTeam.html' },
        { id: 'tab-guide',  src: 'tabs/UserGuide.html'       },
      ];

      // JS modules to load in order after all HTML is injected
      const JS_FILES = [
        'js/EndUseProducts.js',
        'js/IndustrialLogs.js',
        'js/SawnProducts.js',
      ];

      async function loadApp() {
        // 1. Fetch and inject all tab HTML fragments in parallel
        await Promise.all(TAB_FILES.map(async ({ id, src }) => {
          try {
            const res = await fetch(src);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const html = await res.text();
            const el = document.getElementById(id);
            if (el) el.innerHTML = html;
          } catch (e) {
            const el = document.getElementById(id);
            if (el) el.innerHTML = `<div class="tab-loading" style="color:#dc2626">
              ⚠ Could not load ${src}. Open via a web server, not file://.<br>
              <small>${e.message}</small></div>`;
          }
        }));

        // 2. Load JS modules sequentially (order matters — hwp depends on shared state)
        for (const src of JS_FILES) {
          await new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload  = resolve;
            s.onerror = () => reject(new Error(`Failed to load ${src}`));
            document.head.appendChild(s);
          });
        }
      }

      loadApp().catch(err => console.error('App load error:', err));
    </script>
